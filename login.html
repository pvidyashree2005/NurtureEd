<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NurtureEd – Login</title>
  <style>
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eafaf1, #e3f2fd);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #2c3e50;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.5;
      z-index: 0;
    }
    .blob1 { width: 260px; height: 260px; background: #a8edea; top: 10%; left: 10%; }
    .blob2 { width: 300px; height: 300px; background: #cfd9ff; bottom: 10%; right: 10%; }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 24px;
      background: white;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #2c7a7b;
      box-shadow: 0 4px 10px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 10;
      transition: 0.2s;
    }
    .back-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.1);
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 600;
      color: #2c7a7b;
      text-align: center;
      margin-bottom: 4px;
    }

    .tab-row {
      display: flex;
      background: #f0f6f7;
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
    }

    .tab {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      font-size: 0.9rem;
      background: transparent;
      color: #6b7c93;
      transition: 0.2s;
    }

    .tab.active {
      background: white;
      color: #2c7a7b;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e0eaef;
      border-radius: 12px;
      font-size: 0.95rem;
      outline: none;
      background: #f8fbfc;
      transition: border 0.2s;
    }
    input:focus {
      border-color: #2c7a7b;
      background: white;
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      cursor: pointer;
      background: #2c7a7b;
      color: white;
      transition: 0.2s;
      margin-top: 4px;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(44,122,123,0.25); }

    .hidden { display: none; }

    .hint {
      text-align: center;
      font-size: 0.78rem;
      color: #aab8c2;
    }
  </style>
</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <button class="back-btn" onclick="window.location.href='index.html'">← Home</button>

  <div class="card">
    <div class="logo">NurtureEd</div>

    <!-- Tabs -->
    <div class="tab-row">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
      <button class="tab" id="tabRegister" onclick="switchTab('register')">Register Student</button>
    </div>

    <!-- Login fields -->
    <div id="loginFields">
      <div style="display:flex;flex-direction:column;gap:12px;">
        <input id="loginEmail" type="email" placeholder="Email address">
        <input id="loginPassword" type="password" placeholder="Password">
        <button class="btn-primary" id="loginBtn">Login</button>
      </div>
    </div>

    <!-- Register fields -->
    <div id="registerFields" class="hidden">
      <div style="display:flex;flex-direction:column;gap:12px;">
        <input id="regName" type="text" placeholder="Student's full name">
        <input id="regEmail" type="email" placeholder="Email address">
        <input id="regPassword" type="password" placeholder="Password (min 6 chars)">
        <button class="btn-primary" id="registerBtn">Create Student Account</button>
        <div class="hint">Students are registered with role: student</div>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabRegister').classList.toggle('active', !isLogin);
      document.getElementById('loginFields').classList.toggle('hidden', !isLogin);
      document.getElementById('registerFields').classList.toggle('hidden', isLogin);
    }
  </script>
  <script type="module" src="./login.js"></script>
  <script type="module" src="./auth-state.js"></script>
</body>
</html>
